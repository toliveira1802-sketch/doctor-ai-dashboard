services:
  # --- Reverse Proxy (HTTPS automatico) ---
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-srv1303948.hstgr.cloud}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - ./dashboard/dist:/srv/dashboard
    depends_on:
      gateway:
        condition: service_started
    networks:
      - web
      - internal

  # --- Gateway Node.js ---
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - PYTHON_SERVICE_URL=http://python-agents:8000
      - GATEWAY_PORT=3001
    depends_on:
      python-agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # --- Python Agents (FastAPI) ---
  python-agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - internal
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # --- ChromaDB (Vector Store) ---
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - IS_PERSISTENT=TRUE
    # No healthcheck tools available in minimal chroma image
    # Services use start_period delay instead
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:
  chroma_data:
  uploads_data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
