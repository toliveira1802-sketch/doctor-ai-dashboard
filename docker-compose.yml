services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
      - IS_PERSISTENT=TRUE

  python-agents:
    build: ./agents
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - chromadb
    volumes:
      - ./agents:/app
      - ./uploads:/app/uploads
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

  gateway:
    build: ./gateway
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - python-agents

volumes:
  chroma_data:
